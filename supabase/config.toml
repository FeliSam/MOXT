# MOXT — configuration Supabase (projet rbvqfkccbkwjxkvpnwqn)
# Appliquer : npm run setup:supabase

project_id = "moxt"

[auth]
enabled = true
site_url = "https://moxt.netlify.app"
additional_redirect_urls = [
  "http://localhost:5173/**",
  "http://127.0.0.1:5173/**",
  "https://moxt.netlify.app/**",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Auth téléphone / SMS — requis pour signInWithPassword({ phone }).
# Sans provider SMS, les OTP SMS restent indisponibles ; le login mot de passe
# via numéro passe par l’Edge Function phone-login (e-mail du profil).
[auth.sms]
enable_signup = true
enable_confirmations = false

[api]
enabled = true

[db]
major_version = 17

[storage]
enabled = true

[storage.vector]
enabled = false

[realtime]
enabled = true

[functions.telegram-gateway]
verify_jwt = false

[functions.phone-login]
verify_jwt = false
