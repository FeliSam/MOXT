# MOXT — configuration Supabase (projet rbvqfkccbkwjxkvpnwqn)
# Appliquer : npm run setup:supabase (charge scripts/phase2.env pour env(MOXT_*))

project_id = "moxt"

[auth]
enabled = true
enable_signup = true
site_url = "https://moxtapp.ru"
additional_redirect_urls = [
  "http://localhost:5173/**",
  "http://127.0.0.1:5173/**",
  "https://moxtapp.ru/**",
  "https://www.moxtapp.ru/**",
]

[auth.email]
enable_signup = true
# Une seule confirmation sur le nouvel email (OTP dans l’app) — évite le double flux lien ancien+nouveau
double_confirm_changes = false
enable_confirmations = true

# Yandex Cloud Postbox — variables lues au `config push` (voir scripts/phase2.env.example)
[auth.email.smtp]
enabled = true
host = "postbox.cloud.yandex.net"
port = 587
user = "env(MOXT_POSTBOX_SMTP_USER)"
pass = "env(MOXT_POSTBOX_SMTP_PASS)"
admin_email = "env(MOXT_POSTBOX_FROM)"
sender_name = "MOXT"

[auth.rate_limit]
email_sent = 30
# Aligné sur le délai client (90 s) : plafond horaire conservateur pour les OTP SMS.
sms_sent = 30

[auth.email.template.confirmation]
subject = "Подтвердите email — MOXT"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Сброс пароля — MOXT"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Вход в MOXT"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.email_change]
subject = "Подтвердите новый email — MOXT"
content_path = "./supabase/templates/email_change.html"

[auth.email.template.reauthentication]
subject = "{{ .Token }} — код подтверждения MOXT"
content_path = "./supabase/templates/reauthentication.html"

# Auth téléphone / SMS — OTP via hook send-sms → SMSC.ru (ou SMS.ru / Yandex CNS)
# Twilio ci-dessous : identifiants factices pour activer Phone Auth côté Supabase ;
# l'envoi réel passe par [auth.hook.send_sms] (send-sms Edge Function).
[auth.sms]
enable_signup = true
enable_confirmations = false

[auth.sms.twilio]
enabled = true
account_sid = "AC00000000000000000000000000000001"
auth_token = "placeholder_not_used_sms_hook_handles_send"
message_service_sid = "MG00000000000000000000000000000001"

[auth.hook.send_sms]
enabled = true
uri = "https://rbvqfkccbkwjxkvpnwqn.supabase.co/functions/v1/send-sms"
secrets = "env(SEND_SMS_HOOK_SECRET)"

[api]
enabled = true

[db]
major_version = 17

[storage]
enabled = true

[storage.vector]
enabled = false

[realtime]
enabled = true

[functions.phone-login]
verify_jwt = false

[functions.send-sms]
verify_jwt = false

[functions.smsc-webhook]
verify_jwt = false

[auth.external.google]
enabled = false
