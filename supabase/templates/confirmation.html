<!DOCTYPE html>
<html lang="ru">
  <body style="margin:0;padding:0;background:#f4f4f5;font-family:Arial,Helvetica,sans-serif;color:#18181b;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:32px 16px;">
      <tr>
        <td align="center">
          <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#ffffff;border-radius:12px;padding:32px;">
            <tr>
              <td>
                <p style="margin:0 0 8px;font-size:20px;font-weight:700;">MOXT</p>
                <h1 style="margin:0 0 16px;font-size:22px;line-height:1.3;">Код подтверждения email</h1>
                <p style="margin:0 0 20px;line-height:1.6;">Введите этот код в приложении MOXT, чтобы подтвердить адрес и завершить регистрацию:</p>
                <p style="margin:0 0 24px;font-size:28px;font-weight:700;letter-spacing:4px;">{{ .Token }}</p>
                <p style="margin:0 0 12px;line-height:1.6;font-size:13px;color:#71717a;">Код действует ограниченное время. Никому его не сообщайте.</p>
                <p style="margin:0;line-height:1.6;font-size:12px;color:#a1a1aa;">Альтернатива: <a href="{{ .ConfirmationURL }}" style="color:#52525b;">открыть ссылку подтверждения</a>.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
