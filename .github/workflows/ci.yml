name: CI — MOXT

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript — Web
        run: npm run web:build
      - name: TypeScript — Mobile
        working-directory: apps/mobile
        run: npx tsc --noEmit

  test-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Tests shared package
        working-directory: packages/shared
        run: npx vitest run --reporter=verbose

  test-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Tests mobile (Jest)
        working-directory: apps/mobile
        run: npx jest --passWithNoTests --ci

  e2e-maestro:
    needs: [lint-and-typecheck, test-mobile]
    # Nécessite EXPO_TOKEN + variable repo ENABLE_EAS_CI=true
    if: github.ref == 'refs/heads/main' && vars.ENABLE_EAS_CI == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Build dev client (iOS simulator)
        working-directory: apps/mobile
        run: eas build --platform ios --profile development --non-interactive --local
      - name: Run E2E tests
        working-directory: apps/mobile
        run: maestro test .maestro/

  eas-build:
    needs: [lint-and-typecheck, test-shared, test-mobile]
    # Nécessite EXPO_TOKEN + variable repo ENABLE_EAS_CI=true
    if: github.ref == 'refs/heads/main' && vars.ENABLE_EAS_CI == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - name: EAS Build (preview)
        working-directory: apps/mobile
        run: eas build --platform all --profile preview --non-interactive

  eas-submit:
    needs: [eas-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_EAS_CI == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - name: EAS Submit (production)
        working-directory: apps/mobile
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          eas build --platform all --profile production --non-interactive
          eas submit --platform all --profile production --non-interactive

  sentry-sourcemaps:
    needs: [eas-build]
    if: github.ref == 'refs/heads/main' && vars.ENABLE_EAS_CI == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Upload Sentry source maps
        working-directory: apps/mobile
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: npx sentry-expo-upload-sourcemaps dist
