# Builds EAS manuels (mobile Android / iOS)
# Déclenché à la main — nécessite EXPO_TOKEN dans les secrets GitHub.

name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Profil EAS (development, preview, production)
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: Plateforme
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

jobs:
  eas-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - name: EAS Build
        working-directory: apps/mobile
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive
