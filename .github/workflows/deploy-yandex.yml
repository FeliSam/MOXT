# Deploy — Yandex Cloud

on:
  push:
    branches: [main]
    paths:
      - 'moxt-react/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/deploy-yandex.mjs'
      - 'scripts/verify-deploy-version.mjs'
      - 'scripts/lib/yandex-upload.mjs'
      - 'scripts/lib/yandex-s3.mjs'
      - 'scripts/lib/deploy-manifest.mjs'
      - 'scripts/lib/yandex-cdn.mjs'
      - '.github/workflows/deploy-yandex.yml'
  workflow_dispatch:

concurrency:
  group: deploy-yandex-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore deploy manifest state
        uses: actions/cache@v4
        with:
          path: scripts/.deploy-state.json
          key: moxt-deploy-state-${{ github.ref_name }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            moxt-deploy-state-${{ github.ref_name }}-
            moxt-deploy-state-

      - run: npm ci

      - name: Build web (production)
        env:
          GITHUB_SHA: ${{ github.sha }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run web:build

      - name: Cache Yandex CLI
        uses: actions/cache@v4
        id: yc-cache
        with:
          path: /tmp/yc
          key: yc-cli-${{ runner.os }}-v1

      - name: Install Yandex CLI
        if: steps.yc-cache.outputs.cache-hit != 'true'
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /tmp/yc -n
      - run: echo "/tmp/yc/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud credentials
        env:
          YC_SA_JSON_B64: ${{ secrets.YC_SA_JSON_B64 }}
          YC_SA_JSON: ${{ secrets.YC_SA_JSON }}
          MOXT_YC_FOLDER_ID: ${{ vars.MOXT_YC_FOLDER_ID || 'b1gmns3k9udjtgk89c9i' }}
        run: |
          python3 <<'PY'
          import base64, json, os, pathlib
          b64 = os.environ.get("YC_SA_JSON_B64", "").strip()
          raw = os.environ.get("YC_SA_JSON", "").strip()
          if b64:
              content = base64.b64decode(b64).decode("utf-8")
          elif raw:
              content = raw
          else:
              raise SystemExit("YC_SA_JSON_B64 or YC_SA_JSON required — run: npm run setup:github-secrets")
          pathlib.Path("/tmp/yc-sa.json").write_text(content)
          json.load(open("/tmp/yc-sa.json"))
          PY
          yc config profile create moxt-deploy
          yc config set service-account-key /tmp/yc-sa.json
          yc config set folder-id "$MOXT_YC_FOLDER_ID"

      - name: Upload to Object Storage
        env:
          MOXT_YC_BUCKET: ${{ vars.MOXT_YC_BUCKET || 'moxtapp-web' }}
          MOXT_CDN_RESOURCE_ID: ${{ vars.MOXT_CDN_RESOURCE_ID }}
          MOXT_DEPLOY_STATE_PATH: ${{ github.workspace }}/scripts/.deploy-state.json
          MOXT_YC_S3_ACCESS_KEY_ID: ${{ secrets.MOXT_YC_S3_ACCESS_KEY_ID }}
          MOXT_YC_S3_SECRET_ACCESS_KEY: ${{ secrets.MOXT_YC_S3_SECRET_ACCESS_KEY }}
          YC_BIN: yc
        run: node scripts/deploy-yandex.mjs --skip-build --purge-cdn --concurrency=32

      - name: Smoke test version.json
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/verify-deploy-version.mjs
