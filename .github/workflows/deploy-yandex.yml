# Déploie le site web sur Yandex Object Storage à chaque push sur main.
#
# Secrets GitHub requis :
#   YC_SA_JSON_B64           clé SA Yandex (base64, généré par setup:github-secrets)
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
#
# Variables repo :
#   MOXT_YC_BUCKET           défaut moxtapp-web
#   MOXT_CDN_RESOURCE_ID     purge cache CDN
#   MOXT_YC_FOLDER_ID        défaut b1gmns3k9udjtgk89c9i

name: Deploy — Yandex Cloud

on:
  push:
    branches: [main]
    paths:
      - 'moxt-react/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/deploy-yandex.mjs'
      - '.github/workflows/deploy-yandex.yml'
  workflow_dispatch:

concurrency:
  group: deploy-yandex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web (production)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run web:build

      - name: Install Yandex CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /tmp/yc -n
          echo "/tmp/yc/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud credentials
        env:
          YC_SA_JSON_B64: ${{ secrets.YC_SA_JSON_B64 }}
          YC_SA_JSON: ${{ secrets.YC_SA_JSON }}
          MOXT_YC_FOLDER_ID: ${{ vars.MOXT_YC_FOLDER_ID || 'b1gmns3k9udjtgk89c9i' }}
        run: |
          python3 <<'PY'
          import base64, json, os, pathlib
          b64 = os.environ.get("YC_SA_JSON_B64", "").strip()
          raw = os.environ.get("YC_SA_JSON", "").strip()
          if b64:
              content = base64.b64decode(b64).decode("utf-8")
          elif raw:
              content = raw
          else:
              raise SystemExit("YC_SA_JSON_B64 or YC_SA_JSON required — run: npm run setup:github-secrets")
          pathlib.Path("/tmp/yc-sa.json").write_text(content)
          json.load(open("/tmp/yc-sa.json"))
          PY
          yc config profile create moxt-deploy
          yc config set service-account-key /tmp/yc-sa.json
          yc config set folder-id "$MOXT_YC_FOLDER_ID"

      - name: Upload to Object Storage
        env:
          MOXT_YC_BUCKET: ${{ vars.MOXT_YC_BUCKET || 'moxtapp-web' }}
          MOXT_CDN_RESOURCE_ID: ${{ vars.MOXT_CDN_RESOURCE_ID }}
          YC_BIN: yc
        run: node scripts/deploy-yandex.mjs --skip-build --purge-cdn
