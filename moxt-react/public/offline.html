<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MOXT est hors ligne. Reconnectez-vous pour actualiser les données."
    />
    <meta name="theme-color" content="#08705f" />
    <title>MOXT hors ligne</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f4f8f7;
        color: #10231f;
        font-family: system-ui, sans-serif;
      }
      main {
        max-width: 520px;
        padding: 32px;
        border-radius: 28px;
        background: white;
        box-shadow: 0 24px 70px rgb(15 23 42 / 12%);
      }
      button {
        margin-top: 18px;
        padding: 12px 18px;
        border: 0;
        border-radius: 14px;
        background: #08705f;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MOXT est hors ligne</h1>
      <p>
        Les pages déjà chargées peuvent rester disponibles. Reconnectez-vous pour actualiser les
        données.
      </p>
      <button type="button" id="retry">Réessayer</button>
    </main>
    <script>
      document.getElementById('retry').addEventListener('click', function () {
        location.reload()
      })
    </script>
  </body>
</html>
