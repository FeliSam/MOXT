<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse"><stop stop-color="#3730a3"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1e1b4b" flood-opacity="0.3"/></filter>
</defs>
<rect width="160" height="160" rx="36" fill="url(#bg)"/>
<circle cx="128" cy="28" r="22" fill="#fff" opacity="0.1"/>
<circle cx="28" cy="132" r="20" fill="#fff" opacity="0.07"/>
<g filter="url(#sh)">
  <!-- Top face -->
  <path d="M50,80 L80,64 L110,80 L80,96 Z" fill="#fff" opacity="0.97"/>
  <!-- Left face -->
  <path d="M50,80 L80,96 L80,122 L50,106 Z" fill="#c7d2fe" opacity="0.82"/>
  <!-- Right face -->
  <path d="M80,96 L110,80 L110,106 L80,122 Z" fill="#e0e7ff" opacity="0.9"/>
