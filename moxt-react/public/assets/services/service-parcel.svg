  <circle cx="80" cy="60" r="4" fill="#fff" opacity="0.9"/>
  <path d="M80,66 L80,74" stroke="#4f46e5" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Tracking code lines on left face -->
  <rect x="55" y="99" width="18" height="2.5" rx="1" fill="#6366f1" opacity="0.3"/>
  <rect x="55" y="104" width="12" height="2.5" rx="1" fill="#6366f1" opacity="0.2"/>
</g>
</svg>
