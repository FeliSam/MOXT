<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse"><stop stop-color="#1e3a8a"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
<linearGradient id="coin1" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#fef3c7"/><stop offset="1" stop-color="#fcd34d"/></linearGradient>
<linearGradient id="coin2" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#fde68a"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1e1b4b" flood-opacity="0.3"/></filter>
</defs>
<rect width="160" height="160" rx="36" fill="url(#bg)"/>
<circle cx="126" cy="30" r="24" fill="#fff" opacity="0.1"/>
<circle cx="30" cy="130" r="18" fill="#fff" opacity="0.07"/>
<g filter="url(#sh)">
  <!-- Coin stack 1 (back-left) -->
  <ellipse cx="66" cy="98" rx="20" ry="6" fill="#d97706" opacity="0.7"/>
  <rect x="46" y="78" width="40" height="20" rx="0" fill="#f59e0b" opacity="0.75"/>
  <ellipse cx="66" cy="78" rx="20" ry="6" fill="url(#coin2)"/>
  <!-- Coin stack 2 (front-right) -->
  <ellipse cx="94" cy="104" rx="20" ry="6" fill="#b45309" opacity="0.6"/>
  <rect x="74" y="82" width="40" height="22" rx="0" fill="#d97706" opacity="0.8"/>
  <ellipse cx="94" cy="82" rx="20" ry="6" fill="url(#coin1)"/>
  <!-- Currency symbol on top coin -->
  <text x="90" y="86" font-family="sans-serif" font-size="11" font-weight="bold" fill="#92400e" opacity="0.6" text-anchor="middle">₽</text>
  <text x="62" y="82" font-family="sans-serif" font-size="11" font-weight="bold" fill="#92400e" opacity="0.6" text-anchor="middle">F</text>
  <!-- Arrow right between stacks -->
  <path d="M52,65 Q80,50 108,65" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-dasharray="0" opacity="0.7"/>
  <path d="M102,58 L110,65 L102,72" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</g>
</svg>
