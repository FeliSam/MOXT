<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse"><stop stop-color="#92400e"/><stop offset="1" stop-color="#fbbf24"/></linearGradient>
<linearGradient id="body" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#fef3c7"/></linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#451a03" flood-opacity="0.3"/></filter>
</defs>
<rect width="160" height="160" rx="36" fill="url(#bg)"/>
<circle cx="128" cy="28" r="24" fill="#fff" opacity="0.1"/>
<circle cx="28" cy="132" r="18" fill="#fff" opacity="0.07"/>
<g filter="url(#sh)">
  <!-- Handle base left -->
  <rect x="67" y="60" width="8" height="12" rx="4" fill="#fde68a" opacity="0.9"/>
  <!-- Handle base right -->
  <rect x="85" y="60" width="8" height="12" rx="4" fill="#fde68a" opacity="0.9"/>
  <!-- Handle arc -->
  <path d="M67,66 Q67,52 80,52 Q93,52 93,66" fill="none" stroke="#fcd34d" stroke-width="5" stroke-linecap="round"/>
  <!-- Briefcase body main face -->
  <rect x="48" y="70" width="64" height="50" rx="9" fill="url(#body)"/>
  <!-- Right 3D face -->
  <path d="M112,70 L120,77 L120,128 L112,120 Z" fill="#fde68a" opacity="0.6"/>
  <!-- Bottom 3D face -->
  <path d="M48,120 L112,120 L120,128 L56,128 Z" fill="#fcd34d" opacity="0.4"/>
  <!-- Top highlight -->
  <rect x="48" y="70" width="64" height="11" rx="9" fill="#fff" opacity="0.5"/>
  <!-- Center clasp -->
  <rect x="73" y="89" width="14" height="12" rx="4" fill="#d97706" opacity="0.25"/>
  <circle cx="80" cy="95" r="3" fill="#d97706" opacity="0.3"/>
  <!-- Stitch lines -->
  <rect x="56" y="83" width="16" height="3" rx="1.5" fill="#b45309" opacity="0.15"/>
  <rect x="88" y="83" width="16" height="3" rx="1.5" fill="#b45309" opacity="0.15"/>
</g>
</svg>
