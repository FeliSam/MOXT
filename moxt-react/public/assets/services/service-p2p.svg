<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse"><stop stop-color="#4c1d95"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
<linearGradient id="page" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#ede9fe"/></linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#2e1065" flood-opacity="0.3"/></filter>
</defs>
<rect width="160" height="160" rx="36" fill="url(#bg)"/>
<circle cx="126" cy="30" r="22" fill="#fff" opacity="0.1"/>
<circle cx="30" cy="130" r="18" fill="#fff" opacity="0.07"/>
<g filter="url(#sh)">
  <!-- Back page (shadow) -->
  <rect x="56" y="52" width="60" height="72" rx="8" fill="#c4b5fd" opacity="0.5" transform="rotate(-5 86 88)"/>
