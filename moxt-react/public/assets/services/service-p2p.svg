  <rect x="70" y="56" width="40" height="14" fill="#7c3aed" opacity="0.7"/>
  <!-- Content lines -->
  <rect x="56" y="82" width="46" height="4" rx="2" fill="#7c3aed" opacity="0.2"/>
  <rect x="56" y="91" width="38" height="4" rx="2" fill="#7c3aed" opacity="0.15"/>
  <rect x="56" y="100" width="42" height="4" rx="2" fill="#7c3aed" opacity="0.15"/>
  <rect x="56" y="109" width="28" height="4" rx="2" fill="#7c3aed" opacity="0.12"/>
  <!-- Chat bubble decoration -->
  <rect x="56" y="118" width="32" height="7" rx="3.5" fill="#7c3aed" opacity="0.18"/>
  <!-- Sparkle top right -->
  <path d="M107,44 L108.5,48.5 L113,48.5 L109.5,51.2 L110.8,56 L107,53.3 L103.2,56 L104.5,51.2 L101,48.5 L105.5,48.5 Z" fill="#fff" opacity="0.75"/>
