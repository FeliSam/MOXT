<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse"><stop stop-color="#0369a1"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0c4a6e" flood-opacity="0.3"/></filter>
</defs>
<rect width="160" height="160" rx="36" fill="url(#bg)"/>
<circle cx="128" cy="28" r="22" fill="#fff" opacity="0.1"/>
<circle cx="28" cy="132" r="20" fill="#fff" opacity="0.07"/>
<g filter="url(#sh)">
  <!-- Top face (lightest) -->
  <path d="M52,74 L80,58 L108,74 L80,90 Z" fill="#fff" opacity="0.97"/>
  <!-- Left face (medium) -->
  <path d="M52,74 L80,90 L80,118 L52,102 Z" fill="#bae6fd" opacity="0.85"/>
  <!-- Right face (lighter than left) -->
  <path d="M80,90 L108,74 L108,102 L80,118 Z" fill="#e0f2fe" opacity="0.9"/>
  <!-- Ribbon top face diagonal -->
  <path d="M52,74 L80,58 L108,74" fill="none" stroke="#0369a1" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <path d="M66,82 L80,90" stroke="#0369a1" stroke-width="3.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Ribbon left face -->
  <line x1="66" y1="82" x2="66" y2="110" stroke="#0369a1" stroke-width="3.5" stroke-linecap="round" opacity="0.28"/>
  <!-- Ribbon right face -->
  <line x1="94" y1="82" x2="94" y2="110" stroke="#0284c7" stroke-width="3.5" stroke-linecap="round" opacity="0.22"/>
  <!-- Bow at top center -->
  <circle cx="80" cy="58" r="5" fill="#0284c7" opacity="0.45"/>
  <circle cx="80" cy="58" r="2.5" fill="#fff" opacity="0.85"/>
</g>
</svg>
