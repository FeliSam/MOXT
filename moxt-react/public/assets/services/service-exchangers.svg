<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse"><stop stop-color="#0c4a6e"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#082f49" flood-opacity="0.3"/></filter>
</defs>
<rect width="160" height="160" rx="36" fill="url(#bg)"/>
<circle cx="126" cy="30" r="22" fill="#fff" opacity="0.1"/>
<circle cx="30" cy="130" r="18" fill="#fff" opacity="0.07"/>
<g filter="url(#sh)">
  <!-- Left coin/disc -->
  <ellipse cx="62" cy="90" rx="22" ry="22" fill="#fff" opacity="0.18"/>
  <ellipse cx="62" cy="90" rx="16" ry="16" fill="#fff" opacity="0.92"/>
  <text x="62" y="95" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0891b2" text-anchor="middle">₽</text>
  <!-- Right coin/disc -->
  <ellipse cx="98" cy="90" rx="22" ry="22" fill="#fff" opacity="0.18"/>
  <ellipse cx="98" cy="90" rx="16" ry="16" fill="#fff" opacity="0.92"/>
  <text x="98" y="95" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0891b2" text-anchor="middle">F</text>
  <!-- Arrow top: left to right -->
  <path d="M72,66 Q80,58 88,66" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <path d="M83,62 L89,67 L83,72" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Arrow bottom: right to left -->
  <path d="M88,114 Q80,122 72,114" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <path d="M77,118 L71,113 L77,108" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Center check badge -->
  <circle cx="80" cy="90" r="8" fill="#0891b2" opacity="0.85"/>
  <path d="M76,90 L79,93 L85,87" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</g>
</svg>
