<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse"><stop stop-color="#9f1239"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#500724" flood-opacity="0.3"/></filter>
</defs>
<rect width="160" height="160" rx="36" fill="url(#bg)"/>
<circle cx="126" cy="30" r="22" fill="#fff" opacity="0.1"/>
<circle cx="30" cy="130" r="18" fill="#fff" opacity="0.07"/>
<g filter="url(#sh)">
  <!-- Back-left person -->
  <circle cx="56" cy="76" r="13" fill="#fda4af" opacity="0.85"/>
  <path d="M36,110 Q36,95 56,95 Q68,95 73,102" fill="#fda4af" opacity="0.8"/>
  <!-- Back-right person -->
  <circle cx="104" cy="76" r="13" fill="#fda4af" opacity="0.85"/>
  <path d="M87,102 Q92,95 104,95 Q124,95 124,110" fill="#fda4af" opacity="0.8"/>
  <!-- Front center person (larger, prominent) -->
  <circle cx="80" cy="68" r="17" fill="#fff" opacity="0.95"/>
  <path d="M50,112 Q50,92 80,92 Q110,92 110,112" fill="#fff" opacity="0.92"/>
  <!-- Face dots (eyes) -->
  <circle cx="74" cy="66" r="2.5" fill="#e11d48" opacity="0.5"/>
  <circle cx="86" cy="66" r="2.5" fill="#e11d48" opacity="0.5"/>
  <!-- Smile -->
  <path d="M75,73 Q80,78 85,73" fill="none" stroke="#e11d48" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <!-- Connection dots between people -->
  <circle cx="68" cy="87" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="92" cy="87" r="3" fill="#fff" opacity="0.5"/>
</g>
</svg>
