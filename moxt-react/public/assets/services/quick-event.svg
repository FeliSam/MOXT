<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse"><stop stop-color="#5b21b6"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
<linearGradient id="page" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#f3e8ff"/></linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#2e1065" flood-opacity="0.3"/></filter>
</defs>
<rect width="160" height="160" rx="36" fill="url(#bg)"/>
<circle cx="126" cy="30" r="22" fill="#fff" opacity="0.1"/>
<circle cx="30" cy="130" r="18" fill="#fff" opacity="0.07"/>
<g filter="url(#sh)">
  <!-- Calendar main body -->
  <rect x="46" y="62" width="68" height="62" rx="10" fill="url(#page)"/>
  <!-- Right 3D face -->
  <path d="M114,62 L122,68 L122,130 L114,124 Z" fill="#d8b4fe" opacity="0.6"/>
  <!-- Bottom 3D face -->
  <path d="M46,124 L114,124 L122,130 L54,130 Z" fill="#c084fc" opacity="0.4"/>
  <!-- Header bar -->
  <rect x="46" y="62" width="68" height="20" rx="10" fill="#7c3aed" opacity="0.85"/>
  <!-- Header right corner fix -->
  <rect x="100" y="62" width="14" height="20" fill="#7c3aed" opacity="0.85"/>
  <!-- Calendar pegs -->
  <rect x="62" y="55" width="8" height="16" rx="4" fill="#a78bfa" opacity="0.9"/>
  <rect x="90" y="55" width="8" height="16" rx="4" fill="#a78bfa" opacity="0.9"/>
  <!-- Grid dots - day markers -->
  <circle cx="62" cy="97" r="4" fill="#7c3aed" opacity="0.25"/>
  <circle cx="80" cy="97" r="4" fill="#7c3aed" opacity="0.25"/>
  <circle cx="98" cy="97" r="4" fill="#7c3aed" opacity="0.25"/>
  <circle cx="62" cy="111" r="4" fill="#7c3aed" opacity="0.25"/>
  <circle cx="80" cy="111" r="5" fill="#7c3aed" opacity="0.55"/>
  <circle cx="98" cy="111" r="4" fill="#7c3aed" opacity="0.25"/>
  <!-- Star sparkle top right -->
  <path d="M108,42 L109.5,46.5 L114,46.5 L110.5,49.2 L111.8,54 L108,51.3 L104.2,54 L105.5,49.2 L102,46.5 L106.5,46.5 Z" fill="#fff" opacity="0.8"/>
</g>
</svg>
