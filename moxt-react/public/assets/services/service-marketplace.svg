<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse"><stop stop-color="#0f766e"/><stop offset="1" stop-color="#2dd4bf"/></linearGradient>
<linearGradient id="front" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#ccfbf1"/></linearGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#134e4a" flood-opacity="0.3"/></filter>
</defs>
<rect width="160" height="160" rx="36" fill="url(#bg)"/>
<circle cx="128" cy="28" r="22" fill="#fff" opacity="0.1"/>
<circle cx="28" cy="132" r="18" fill="#fff" opacity="0.07"/>
<g filter="url(#sh)">
  <!-- Awning -->
  <path d="M44,72 L116,72 L110,60 L50,60 Z" fill="#0d9488" opacity="0.8"/>
  <!-- Awning stripes -->
  <path d="M56,60 L50,72" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M70,60 L64,72" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M84,60 L80,72" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M98,60 L94,72" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <!-- Store front face -->
  <rect x="44" y="72" width="72" height="56" rx="4" fill="url(#front)"/>
  <!-- Right 3D face -->
  <path d="M116,72 L124,78 L124,134 L116,128 Z" fill="#5eead4" opacity="0.55"/>
  <!-- Bottom 3D face -->
  <path d="M44,128 L116,128 L124,134 L52,134 Z" fill="#2dd4bf" opacity="0.4"/>
  <!-- Display window -->
  <rect x="54" y="80" width="52" height="30" rx="5" fill="#f0fdfa" opacity="0.9"/>
  <!-- Window highlight -->
  <rect x="54" y="80" width="52" height="6" rx="5" fill="#fff" opacity="0.6"/>
  <!-- Door -->
  <rect x="72" y="110" width="16" height="18" rx="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="86" cy="119" r="1.8" fill="#0d9488" opacity="0.5"/>
  <!-- Sign text -->
  <rect x="60" y="64" width="40" height="7" rx="3" fill="#fff" opacity="0.2"/>
</g>
</svg>
