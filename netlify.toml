# MOXT — déploiement web (Vite + React Router SPA)
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "node scripts/write-vite-env.mjs && npm run web:build"
  publish = "moxt-react/dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"
  VITE_SUPABASE_URL = "https://rbvqfkccbkwjxkvpnwqn.supabase.co"
  # Clé anon publique (visible côté client — sécurité via RLS Supabase)
  VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidnFma2NjYmt3anhrdnBud3FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjI2NDMsImV4cCI6MjA5ODIzODY0M30.ZpAr5eEnxoxy3TQ4hIA3SoX1NTuPg-0pt4UQ2mS5lDI"

# React Router : toutes les routes → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
